name: Build

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: |
          pyinstaller --onefile --console --name onenote2md onenote2md/gui.py --clean 2>&1

      - name: Create ZIP
        run: Compress-Archive -Path dist/onenote2md.exe -DestinationPath onenote2md-windows.zip -Force

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: onenote2md-windows
          path: onenote2md-windows.zip
