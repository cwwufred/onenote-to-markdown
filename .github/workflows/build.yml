name: Build

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: |
          pyinstaller --onefile --console onenote2md/gui.py
          dir dist

      - name: Create ZIP
        run: |
          if (Test-Path dist/onenote2md.exe) {
            Compress-Archive -Path dist/onenote2md.exe -DestinationPath onenote2md-windows.zip -Force
          } else {
            Write-Host "ERROR: exe not found"
            Get-ChildItem -Recurse
            exit 1
          }

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: onenote2md-windows
          path: onenote2md-windows.zip
